name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # weekly link check (Mondays 06:00 UTC)

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Validate data (schema + structure)
        run: python scripts/validate.py
      - name: README is in sync with data
        run: python scripts/generate_readme.py --check
      - name: Tests
        run: python -m pytest -q

  links:
    # Link rot is checked on PRs and on the weekly schedule, not on every push.
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Check links are reachable
        run: python scripts/check_links.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build container
        run: docker build -t awesome-langchain-langgraph .
